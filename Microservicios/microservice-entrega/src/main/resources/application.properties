spring.config.import=optional:file:.env[.properties]

spring.application.name=microservice-entrega
server.port=${SERVER_PORT:8084}
server.servlet.context-path=/api/entregas

# --- DATABASE ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA OPTIMIZADO ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false

# --- HIKARI (Render-friendly) ---
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.connection-timeout=20000

# --- EUREKA ---
eureka.client.service-url.defaultZone=${EUREKA_URL}
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=${RENDER_EXTERNAL_URL:microservice-entrega}

# --- JWT ---
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXP}

# --- SMTP ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=fluxoracl@gmail.com
spring.mail.password=${SMTP_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
