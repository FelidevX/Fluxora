spring.application.name=microservice-eureka
server.port=${SERVER_PORT:8761}

# Desactiva Config Server (no aplica en Render)
spring.config.import=optional:

# Eureka Server
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Este es el endpoint público por el que se registrarán los clientes
eureka.client.service-url.defaultZone=https://fluxora-e3su.onrender.com/

# Hostname real (Render expone el dominio externo)
eureka.instance.hostname=fluxora-e3su.onrender.com
eureka.instance.prefer-ip-address=true

# Para evitar auto-desconexión de instancias en entorno cloud
eureka.server.enable-self-preservation=false
