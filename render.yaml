# render.yaml (Versión que debería ser aceptada)
services:
  # 1. Base de datos PostgreSQL (pserv)
  # Un pserv NO necesita 'runtime' ni 'startCommand'. 
  # Simplemente definimos el tipo y las credenciales.
  - type: pserv 
    name: fluxora-db
    plan: starter
    envVars:
      - key: DATABASE_NAME
        value: fluxora_db
      - key: USER
        value: fluxora
      - key: PASSWORD 
        generateValue: true

  # 2. Servidor de Descubrimiento (Eureka Server)
  # Usamos 'private' para que solo sea accesible internamente.
  - type: private
    name: eureka-server
    rootDir: ./Microservicios/microservice-eureka
    plan: starter
    # Render suele aceptar 'java' más fácilmente cuando se usa con 'private'
    runtime: java 
    buildCommand: ./mvnw clean install -DskipTests 
    startCommand: java -jar target/*.jar 
    envVars:
      - key: PORT
        value: 8761
    
  # 3. Microservicios de Backend (Internos)
  # Usar 'type: private' los define correctamente como internos sin un dominio público.
  - type: private
    name: cliente-service
    rootDir: ./Microservicios/microservice-cliente
    plan: starter
    runtime: java 
    buildCommand: ./mvnw clean install -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: PORT
        value: 8083
      - key: EUREKA_SERVER_URL
        value: http://eureka-server:8761/eureka/ 

  # El resto de microservicios (usuario, entrega, inventario...) deben seguir este mismo patrón 'type: private'

  - type: private
    name: usuario-service
    rootDir: ./Microservicios/microservice-usuario
    plan: starter
    runtime: java 
    buildCommand: ./mvnw clean install -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: PORT
        value: 8081
      - key: EUREKA_SERVER_URL
        value: http://eureka-server:8761/eureka/

  - type: private
    name: entrega-service
    rootDir: ./Microservicios/microservice-entrega
    plan: starter
    runtime: java 
    buildCommand: ./mvnw clean install -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: PORT
        value: 8084
      - key: EUREKA_SERVER_URL
        value: http://eureka-server:8761/eureka/

  - type: private
    name: inventario-service
    rootDir: ./Microservicios/microservice-inventario
    plan: starter
    runtime: java 
    buildCommand: ./mvnw clean install -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: PORT
        value: 8082
      - key: EUREKA_SERVER_URL
        value: http://eureka-server:8761/eureka/
    
  # 4. API Gateway (Punto de acceso público al Backend)
  # Este es el único servicio de Spring Boot que debe ser de tipo 'web'
  - type: web 
    name: api-gateway
    rootDir: ./Microservicios/microservice-gateway
    plan: starter
    runtime: java 
    buildCommand: ./mvnw clean install -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: PORT
        value: 8080
      - key: EUREKA_SERVER_URL
        value: http://eureka-server:8761/eureka/
        
  # 5. Frontend Next.js (Punto de acceso para usuarios)
  # Los frontends siempre son 'web'
  - type: web
    name: frontend-fluxora
    rootDir: ./frontend-fluxora
    plan: starter
    runtime: node 
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000