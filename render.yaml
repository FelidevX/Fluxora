services:
  # Base de datos PostgreSQL
  - type: pserv
    name: fluxora-db
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile.postgres
    envVars:
      - key: POSTGRES_USER
        value: fluxora
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_DB
        value: fluxora_db
    disk:
      name: postgres-data
      mountPath: /var/lib/postgresql/data
      sizeGB: 1

  # Eureka Server (debe desplegarse primero)
  - type: web
    name: eureka-server
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Microservicios/microservice-eureka/Dockerfile
    dockerContext: ./Microservicios/microservice-eureka
    healthCheckPath: /actuator/health
    envVars:
      - key: SERVER_PORT
        value: 8761
      - key: EUREKA_CLIENT_REGISTER_WITH_EUREKA
        value: false
      - key: EUREKA_CLIENT_FETCH_REGISTRY
        value: false

  # Microservicio Usuario
  - type: web
    name: usuario-service
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Microservicios/microservice-usuario/Dockerfile
    dockerContext: ./Microservicios/microservice-usuario
    healthCheckPath: /actuator/health
    envVars:
      - key: SERVER_PORT
        value: 8081
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: fluxora-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        value: fluxora
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: fluxora-db
          property: password
      - key: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
        value: https://eureka-server.onrender.com/eureka/
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SPRING_JPA_SHOW_SQL
        value: false

  # Microservicio Cliente
  - type: web
    name: cliente-service
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Microservicios/microservice-cliente/Dockerfile
    dockerContext: ./Microservicios/microservice-cliente
    healthCheckPath: /actuator/health
    envVars:
      - key: SERVER_PORT
        value: 8083
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: fluxora-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        value: fluxora
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: fluxora-db
          property: password
      - key: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
        value: https://eureka-server.onrender.com/eureka/
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SPRING_JPA_SHOW_SQL
        value: false

  # Microservicio Inventario
  - type: web
    name: inventario-service
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Microservicios/microservice-inventario/Dockerfile
    dockerContext: ./Microservicios/microservice-inventario
    healthCheckPath: /actuator/health
    envVars:
      - key: SERVER_PORT
        value: 8082
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: fluxora-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        value: fluxora
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: fluxora-db
          property: password
      - key: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
        value: https://eureka-server.onrender.com/eureka/
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SPRING_JPA_SHOW_SQL
        value: false

  # Microservicio Entrega
  - type: web
    name: entrega-service
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Microservicios/microservice-entrega/Dockerfile
    dockerContext: ./Microservicios/microservice-entrega
    healthCheckPath: /actuator/health
    envVars:
      - key: SERVER_PORT
        value: 8084
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: fluxora-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        value: fluxora
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: fluxora-db
          property: password
      - key: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
        value: https://eureka-server.onrender.com/eureka/
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SPRING_JPA_SHOW_SQL
        value: false

  # API Gateway
  - type: web
    name: api-gateway
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Microservicios/microservice-gateway/Dockerfile
    dockerContext: ./Microservicios/microservice-gateway
    healthCheckPath: /actuator/health
    envVars:
      - key: SERVER_PORT
        value: 8080
      - key: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
        value: https://eureka-server.onrender.com/eureka/
      - key: SPRING_CLOUD_GATEWAY_ROUTES_0_ID
        value: usuario-service
      - key: SPRING_CLOUD_GATEWAY_ROUTES_0_URI
        value: lb://USUARIO-SERVICE
      - key: SPRING_CLOUD_GATEWAY_ROUTES_0_PREDICATES_0
        value: Path=/api/usuarios/**

  # Frontend Next.js
  - type: web
    name: frontend-fluxora
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./frontend-fluxora/Dockerfile
    dockerContext: ./frontend-fluxora
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://api-gateway.onrender.com
      - key: NODE_ENV
        value: production

databases:
  - name: fluxora-db
    databaseName: fluxora_db
    user: fluxora
    plan: free
    region: oregon