# render.yaml (Versión Final)
services:
  # 1. Base de datos PostgreSQL (Render Managed Database)
  - type: pserv
    name: fluxora-db
    plan: starter
    # **SE ELIMINA** la sección 'disk'
    envVars:
      - key: DATABASE_NAME
        value: fluxora_db
      - key: USER
        value: fluxora
      - key: PASSWORD
        generateValue: true 

  # 2. Servidor de Descubrimiento (Eureka Server)
  - type: web
    name: eureka-server
    rootDir: ./Microservicios/microservice-eureka
    plan: starter
    env: java # <--- CORRECCIÓN DE RUNTIME
    buildCommand: ./mvnw clean install -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: PORT
        value: 8761
    
  # 3. Microservicios de Backend (Internos)
  - type: web
    name: cliente-service
    rootDir: ./Microservicios/microservice-cliente
    plan: starter
    env: java # <--- CORRECCIÓN DE RUNTIME
    buildCommand: ./mvnw clean install -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: PORT
        value: 8083

  - type: web
    name: usuario-service
    rootDir: ./Microservicios/microservice-usuario
    plan: starter
    env: java # <--- CORRECCIÓN DE RUNTIME
    buildCommand: ./mvnw clean install -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: PORT
        value: 8081

  - type: web
    name: entrega-service
    rootDir: ./Microservicios/microservice-entrega
    plan: starter
    env: java # <--- CORRECCIÓN DE RUNTIME
    buildCommand: ./mvnw clean install -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: PORT
        value: 8084

  - type: web
    name: inventario-service
    rootDir: ./Microservicios/microservice-inventario
    plan: starter
    env: java # <--- CORRECCIÓN DE RUNTIME
    buildCommand: ./mvnw clean install -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: PORT
        value: 8082
    
  # 4. API Gateway (Punto de acceso público al Backend)
  - type: web
    name: api-gateway
    rootDir: ./Microservicios/microservice-gateway
    plan: starter
    env: java # <--- CORRECCIÓN DE RUNTIME
    buildCommand: ./mvnw clean install -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: PORT
        value: 8080

  # 5. Frontend Next.js (Punto de acceso para usuarios)
  - type: web
    name: frontend-fluxora
    rootDir: ./frontend-fluxora
    plan: starter
    env: node # <--- CORRECCIÓN DE RUNTIME (Para Next.js)
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000