spring.config.import=optional:file:.env[.properties]

spring.application.name=microservice-usuario
server.port=${SERVER_PORT}
server.servlet.context-path=/api/usuarios

# ============================
# BASE DE DATOS - OPTIMIZADO
# ============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari - Pool MINIMAL para Render FREE
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.max-lifetime=300000

# ============================
# JPA / HIBERNATE - OPTIMIZADO
# ============================

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ❗ IMPORTANTE: desactivar schema update
spring.jpa.hibernate.ddl-auto=none

# TEMPORAL: Habilitar logs para debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.microservice.usuario=DEBUG

spring.jpa.open-in-view=false

# Evitar metadata JDBC (acelera arranque)
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.id.new_generator_mappings=false
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.bytecode.use_reflection_optimizer=true

# ============================
# EUREKA CLIENT
# ============================
eureka.client.service-url.defaultZone=${EUREKA_URL}
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# Cambia este hostname al dominio real de Render (cuando despliegues)
eureka.instance.hostname=https://usuario-service-dxz6.onrender.com

# ============================
# JWT
# ============================
security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-minutes=${JWT_EXP}
