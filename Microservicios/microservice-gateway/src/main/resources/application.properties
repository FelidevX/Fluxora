spring.application.name=microservice-gateway
server.port=${PORT:8080}
spring.main.web-application-type=reactive

# Apuntar al Eureka Server (usar variable de entorno)
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Configuración para Render
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.non-secure-port=${server.port}
eureka.instance.instance-id=${spring.application.name}:${random.value}

# Gateway Discovery
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# CORS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:3000,https://*.onrender.com
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true

spring.web.resources.add-mappings=false

# Health checks y actuator (CRÍTICO para Render)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.health.defaults.enabled=true
management.health.diskspace.enabled=false

# Configuración para que la app arranque aunque Eureka no esté disponible
spring.cloud.discovery.enabled=true
eureka.client.healthcheck.enabled=false

# Logging para debug
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.com.netflix.eureka=DEBUG
logging.level.com.netflix.discovery=DEBUG
