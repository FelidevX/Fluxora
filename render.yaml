services:
  # Eureka Server (debe desplegarse primero)
  - type: web
    name: eureka-server
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Microservicios/microservice-eureka/Dockerfile
    dockerContext: ./Microservicios/microservice-eureka
    healthCheckPath: /actuator/health
    envVars:
      - key: SERVER_PORT
        value: 8761
      - key: EUREKA_CLIENT_REGISTER_WITH_EUREKA
        value: false
      - key: EUREKA_CLIENT_FETCH_REGISTRY
        value: false

  # Microservicio Usuario
  - type: web
    name: usuario-service
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Microservicios/microservice-usuario/Dockerfile
    dockerContext: ./Microservicios/microservice-usuario
    healthCheckPath: /actuator/health
    envVars:
      - key: SERVER_PORT
        value: 8081
      - key: DATABASE_URL
        fromDatabase:
          name: fluxora-db
          property: connectionString
      - key: DB_URL
        value: jdbc:${DATABASE_URL}
      - key: DB_USERNAME
        fromDatabase:
          name: fluxora-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: fluxora-db
          property: password
      - key: EUREKA_URL
        value: https://eureka-server.onrender.com/eureka/
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXP
        value: 60
      - key: SMTP_PASSWORD
        sync: false

  # Microservicio Cliente
  - type: web
    name: cliente-service
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Microservicios/microservice-cliente/Dockerfile
    dockerContext: ./Microservicios/microservice-cliente
    healthCheckPath: /actuator/health
    envVars:
      - key: SERVER_PORT
        value: 8083
      - key: DATABASE_URL
        fromDatabase:
          name: fluxora-db
          property: connectionString
      - key: DB_URL
        value: jdbc:${DATABASE_URL}
      - key: DB_USERNAME
        fromDatabase:
          name: fluxora-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: fluxora-db
          property: password
      - key: EUREKA_URL
        value: https://eureka-server.onrender.com/eureka/
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXP
        value: 60
      - key: SMTP_PASSWORD
        sync: false

  # Microservicio Inventario
  - type: web
    name: inventario-service
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Microservicios/microservice-inventario/Dockerfile
    dockerContext: ./Microservicios/microservice-inventario
    healthCheckPath: /actuator/health
    envVars:
      - key: SERVER_PORT
        value: 8082
      - key: DATABASE_URL
        fromDatabase:
          name: fluxora-db
          property: connectionString
      - key: DB_URL
        value: jdbc:${DATABASE_URL}
      - key: DB_USERNAME
        fromDatabase:
          name: fluxora-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: fluxora-db
          property: password
      - key: EUREKA_URL
        value: https://eureka-server.onrender.com/eureka/
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXP
        value: 60
      - key: SMTP_PASSWORD
        sync: false

  # Microservicio Entrega
  - type: web
    name: entrega-service
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Microservicios/microservice-entrega/Dockerfile
    dockerContext: ./Microservicios/microservice-entrega
    healthCheckPath: /actuator/health
    envVars:
      - key: SERVER_PORT
        value: 8084
      - key: DATABASE_URL
        fromDatabase:
          name: fluxora-db
          property: connectionString
      - key: DB_URL
        value: jdbc:${DATABASE_URL}
      - key: DB_USERNAME
        fromDatabase:
          name: fluxora-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: fluxora-db
          property: password
      - key: EUREKA_URL
        value: https://eureka-server.onrender.com/eureka/
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXP
        value: 60
      - key: SMTP_PASSWORD
        sync: false

  # API Gateway
  - type: web
    name: api-gateway
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Microservicios/microservice-gateway/Dockerfile
    dockerContext: ./Microservicios/microservice-gateway
    healthCheckPath: /actuator/health
    envVars:
      - key: SERVER_PORT
        value: 8080
      - key: EUREKA_URL
        value: https://eureka-server.onrender.com/eureka/

  # Frontend Next.js
  - type: web
    name: frontend-fluxora
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./frontend-fluxora/Dockerfile
    dockerContext: ./frontend-fluxora
    envVars:
      - key: NEXT_PUBLIC_API_BASE
        value: https://api-gateway.onrender.com
      - key: NODE_ENV
        value: production

databases:
  - name: fluxora-db
    databaseName: fluxora_db
    user: fluxora
    plan: free
    region: oregon