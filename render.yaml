# render.yaml (Versión con ruta de Dockerfile para evitar errores de runtime)
services:
  # 1. Base de datos PostgreSQL (pserv)
  - type: pserv 
    name: fluxora-db
    plan: starter
    envVars:
      - key: DATABASE_NAME
        value: fluxora_db
      - key: USER
        value: fluxora
      - key: PASSWORD 
        generateValue: true

  # 2. Servidor de Descubrimiento (Eureka Server)
  - type: web
    name: eureka-server
    rootDir: ./Microservicios/microservice-eureka
    plan: starter
    # Usamos dockerfilePath para evitar el error 'invalid runtime java'
    dockerfilePath: Dockerfile 
    buildCommand: ./mvnw clean install -DskipTests 
    startCommand: java -jar target/*.jar 
    envVars:
      - key: PORT
        value: 8761
    
  # 3. Microservicios de Backend (Usando dockerfilePath)
  - type: web
    name: cliente-service
    rootDir: ./Microservicios/microservice-cliente
    plan: starter
    dockerfilePath: Dockerfile 
    buildCommand: ./mvnw clean install -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: PORT
        value: 8083
      - key: EUREKA_SERVER_URL
        value: http://eureka-server:8761/eureka/ 

  - type: web
    name: usuario-service
    rootDir: ./Microservicios/microservice-usuario
    plan: starter
    dockerfilePath: Dockerfile 
    buildCommand: ./mvnw clean install -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: PORT
        value: 8081
      - key: EUREKA_SERVER_URL
        value: http://eureka-server:8761/eureka/

  - type: web
    name: entrega-service
    rootDir: ./Microservicios/microservice-entrega
    plan: starter
    dockerfilePath: Dockerfile 
    buildCommand: ./mvnw clean install -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: PORT
        value: 8084
      - key: EUREKA_SERVER_URL
        value: http://eureka-server:8761/eureka/

  - type: web
    name: inventario-service
    rootDir: ./Microservicios/microservice-inventario
    plan: starter
    dockerfilePath: Dockerfile 
    buildCommand: ./mvnw clean install -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: PORT
        value: 8082
      - key: EUREKA_SERVER_URL
        value: http://eureka-server:8761/eureka/
    
  # 4. API Gateway (Punto de acceso público)
  - type: web 
    name: api-gateway
    rootDir: ./Microservicios/microservice-gateway
    plan: starter
    dockerfilePath: Dockerfile 
    buildCommand: ./mvnw clean install -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: PORT
        value: 8080
      - key: EUREKA_SERVER_URL
        value: http://eureka-server:8761/eureka/
        
  # 5. Frontend Next.js (Necesita 'runtime' si no tiene Dockerfile)
  # Si el frontend no tiene Dockerfile, debemos mantener el 'runtime: node'
  - type: web
    name: frontend-fluxora
    rootDir: ./frontend-fluxora
    plan: starter
    runtime: node 
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000